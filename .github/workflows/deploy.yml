name: Build and deploy blog

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: blog-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.13.1
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Unit tests
        run: pnpm test

      - name: Type/content check
        run: pnpm check

      - name: Build SSR site
        run: pnpm build

      - name: Audit generated site
        run: pnpm audit:build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: blog-ssr-release
          path: |
            dist
            package.json
            pnpm-lock.yaml
            pnpm-workspace.yaml
            scripts/migrate-db.mjs
          retention-days: 7

      - name: Deploy to server
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          BLOG_SSH_HOST: ${{ secrets.BLOG_SSH_HOST }}
          BLOG_SSH_PORT: ${{ secrets.BLOG_SSH_PORT }}
          BLOG_SSH_USER: ${{ secrets.BLOG_SSH_USER }}
          BLOG_SSH_KEY_B64: ${{ secrets.BLOG_SSH_KEY_B64 }}
          REMOTE_ROOT: /opt/proxy/blog
          SERVICE_NAME: blog
        run: |
          set -euo pipefail
          test -n "$BLOG_SSH_HOST"
          test -n "$BLOG_SSH_PORT"
          test -n "$BLOG_SSH_USER"
          test -n "$BLOG_SSH_KEY_B64"
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s' "$BLOG_SSH_KEY_B64" | base64 -d > ~/.ssh/blog_deploy_key
          chmod 600 ~/.ssh/blog_deploy_key
          ssh-keyscan -p "$BLOG_SSH_PORT" "$BLOG_SSH_HOST" >> ~/.ssh/known_hosts
          RELEASE="$(date -u +%Y%m%d%H%M%S)-${GITHUB_SHA::7}"
          SSH="ssh -i ~/.ssh/blog_deploy_key -p $BLOG_SSH_PORT -o IdentitiesOnly=yes $BLOG_SSH_USER@$BLOG_SSH_HOST"
          RSYNC_RSH="ssh -i ~/.ssh/blog_deploy_key -p $BLOG_SSH_PORT -o IdentitiesOnly=yes"
          $SSH "mkdir -p $REMOTE_ROOT/releases/$RELEASE $REMOTE_ROOT/data"
          rsync -az --delete -e "$RSYNC_RSH" dist package.json pnpm-lock.yaml pnpm-workspace.yaml scripts "$BLOG_SSH_USER@$BLOG_SSH_HOST:$REMOTE_ROOT/releases/$RELEASE/"
          $SSH "cd $REMOTE_ROOT/releases/$RELEASE && corepack enable && pnpm install --prod --frozen-lockfile"
          $SSH "cd $REMOTE_ROOT/releases/$RELEASE && set -a && [ ! -f $REMOTE_ROOT/.env ] || . $REMOTE_ROOT/.env && set +a && BLOG_DB_PATH=\${BLOG_DB_PATH:-$REMOTE_ROOT/data/blog.sqlite} node scripts/migrate-db.mjs"
          $SSH "ln -sfn $REMOTE_ROOT/releases/$RELEASE $REMOTE_ROOT/current && sudo systemctl restart $SERVICE_NAME && sleep 2 && curl -fsS http://127.0.0.1:4321/ >/dev/null"
          $SSH "find $REMOTE_ROOT/releases -mindepth 1 -maxdepth 1 -type d | sort -r | tail -n +4 | xargs -r rm -rf"
