name: Ops update CPA once

on:
  workflow_dispatch:

jobs:
  update-cpa:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Install sshpass
        run: |
          set -euo pipefail
          sudo apt-get update -y >/dev/null
          sudo apt-get install -y sshpass >/dev/null
      - name: Update CPA on server
        env:
          OPS_SSH_HOST: ${{ secrets.OPS_SSH_HOST }}
          OPS_SSH_PORT: ${{ secrets.OPS_SSH_PORT }}
          OPS_SSH_USER: ${{ secrets.OPS_SSH_USER }}
          SSHPASS: ${{ secrets.OPS_SSH_PASSWORD }}
        run: |
          set -euo pipefail
          test -n "$OPS_SSH_HOST"
          test -n "$OPS_SSH_PORT"
          test -n "$OPS_SSH_USER"
          test -n "$SSHPASS"
          mkdir -p ~/.ssh
          ssh-keyscan -p "$OPS_SSH_PORT" "$OPS_SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          sshpass -e ssh -p "$OPS_SSH_PORT" -o StrictHostKeyChecking=no -o UserKnownHostsFile=~/.ssh/known_hosts -o ConnectTimeout=20 "$OPS_SSH_USER@$OPS_SSH_HOST" 'bash -se' <<'REMOTE'
          set -euo pipefail
          cd /opt/proxy
          echo '--- resolve latest ---'
          release_tag="$(curl -fsSL -H 'Accept: application/vnd.github+json' -H 'User-Agent: cpa-update-workflow' https://api.github.com/repos/router-for-me/CLIProxyAPI/releases/latest | python3 -c 'import json,sys; print(json.load(sys.stdin)["tag_name"])')"
          target_image=''
          for candidate in "eceasy/cli-proxy-api:${release_tag}-amd64" "eceasy/cli-proxy-api:${release_tag}"; do
            if docker manifest inspect "$candidate" >/dev/null 2>&1; then target_image="$candidate"; break; fi
          done
          test -n "$target_image"
          echo "release_tag=$release_tag"
          echo "target_image=$target_image"
          echo '--- current image ---'
          docker inspect cpa --format 'before image={{.Config.Image}} image_id={{.Image}} status={{.State.Status}} restart={{.RestartCount}}' || true
          echo '--- edit compose ---'
          backup="/opt/proxy/docker-compose.yml.bak-update-cpa-gha-$(date +%Y%m%d-%H%M%S)"
          cp /opt/proxy/docker-compose.yml "$backup"
          TARGET_IMAGE="$target_image" python3 - <<'PY'
          import os
          from pathlib import Path
          path = Path('/opt/proxy/docker-compose.yml')
          target = os.environ['TARGET_IMAGE']
          text = path.read_bytes().decode('utf-8', 'replace')
          lines = text.splitlines(True)
          out = []
          in_cpa = False
          replaced = False
          for line in lines:
              if line.startswith('  cpa:'):
                  in_cpa = True
                  out.append(line)
                  continue
              if in_cpa and line.startswith('  ') and not line.startswith('    ') and line.strip().endswith(':'):
                  if not replaced:
                      out.append('    image: ' + target + '\n')
                      replaced = True
                  in_cpa = False
              if in_cpa and line.startswith('    image:'):
                  out.append('    image: ' + target + '\n')
                  replaced = True
                  continue
              out.append(line)
          if in_cpa and not replaced:
              out.append('    image: ' + target + '\n')
              replaced = True
          if not replaced:
              raise SystemExit('cpa image line not found')
          path.write_bytes(''.join(out).encode('utf-8'))
          print('compose_cpa_image=' + target)
          PY
          echo "backup=$backup"
          docker compose config >/tmp/gha-update-cpa-compose-ok.yml
          echo '--- pull/recreate ---'
          docker compose stop cpa-netwatch >/dev/null 2>&1 || true
          docker compose pull cpa
          docker compose up -d --no-deps --force-recreate cpa
          echo '--- verify ---'
          docker inspect cpa --format 'after image={{.Config.Image}} image_id={{.Image}} status={{.State.Status}} started={{.State.StartedAt}} restart={{.RestartCount}}'
          docker logs --tail 120 cpa 2>&1 | grep -E 'CLIProxyAPI Version|API server started|configuration updated|BuiltAt|Commit' | tail -n 20 || true
          docker exec cpa-manager sh -lc 'wget -qS -O /tmp/cpa-api-root.json http://cpa:8317/ 2>/tmp/cpa-api-root.headers; cat /tmp/cpa-api-root.headers; cat /tmp/cpa-api-root.json' | sed -n '1,80p'
          REMOTE
